name: Silicon Radar Source Discovery

on:
  schedule:
    - cron: '0 4 * * 6'   # Saturday 9:30 AM IST = 4:00 AM UTC
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Search-based discovery
        run: python scripts/run_discovery.py
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      - name: Citation-graph discovery
        run: python scripts/run_citations.py
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
      - name: Send weekly discovery digest
        run: python scripts/send_discovery_digest.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
      - name: Promote verified sources to probation
        run: python scripts/run_pipeline.py promote
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
